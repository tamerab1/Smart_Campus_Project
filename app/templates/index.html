<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus Assistant</title>
    <style>
        :root { --primary-color: #4a90e2; --bg-color: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding-top: 50px; }
        .chat-container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        
        #chat-box { height: 400px; overflow-y: auto; padding: 10px; border-bottom: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 12px 16px; border-radius: 18px; max-width: 80%; line-height: 1.4; font-size: 0.95em; }
        .user-message { background-color: var(--primary-color); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-message { background-color: #e9ecef; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .meta-data { font-size: 0.7em; opacity: 0.7; display: block; margin-top: 4px; }

        .input-area { display: flex; gap: 10px; margin-top: 15px; }
        input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { padding: 10px 20px; background: var(--primary-color); color: white; border: none; border-radius: 20px; cursor: pointer; }

        .quick-actions { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; justify-content: center; }
        .quick-actions button { background: #f0f4f8; color: #555; border: 1px solid #ddd; font-size: 0.8em; }
        .quick-actions button:hover { background: var(--primary-color); color: white; }
    </style>
</head>
<body>

<div class="chat-container">
    <h2>Smart Campus Assistant</h2>
    
    <div class="quick-actions">
        <button onclick="quickAsk('Where is the office of the Python professor?')">Python Professor?</button>
        <button onclick="quickAsk('Where is room 205?')">Room 205?</button>
        <button onclick="quickAsk('What is the status of the Library WiFi?')">WiFi Status?</button>
    </div>

    <div id="chat-box"></div>
    
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    let chatHistory = [];

    function quickAsk(text) {
        document.getElementById("user-input").value = text;
        sendMessage();
    }

    async function sendMessage() {
        const inputElement = document.getElementById("user-input");
        const message = inputElement.value.trim();
        if (!message) return;

        inputElement.value = "";
        addMessageToUI(message, "user-message");

        try {
            const response = await fetch("/ask", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ question: message, history: chatHistory })
            });

            const data = await response.json();
            addMessageToUI(data.answer, "ai-message", data.category, data.response_time);

            chatHistory.push({ role: "user", content: message });
            chatHistory.push({ role: "assistant", content: data.answer });
        } catch (error) {
            addMessageToUI("Error connecting to the server.", "ai-message");
        }
    }

    function addMessageToUI(text, className, category="", time="") {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${className}`;
        msgDiv.innerText = text;
        if (category && time) {
            const metaSpan = document.createElement("span");
            metaSpan.className = "meta-data";
            metaSpan.innerText = `[${category}] ⚡ ${time}`;
            msgDiv.appendChild(metaSpan);
        }
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) { if (event.key === "Enter") sendMessage(); }
</script>
</body>
</html>
