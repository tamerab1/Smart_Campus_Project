{% extends "base.html" %}

{% block content %}
<style>
    .edit-card {
        background: white;
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1);
        max-width: 600px;
        margin: 40px auto;
        border: 1px solid var(--border-color);
    }
    .edit-card h2 {
        margin-top: 0;
        color: var(--text-main);
        margin-bottom: 25px;
        border-bottom: 2px solid var(--bg-main);
        padding-bottom: 10px;
    }
    .input-label {
        font-weight: 600;
        font-size: 14px;
        color: var(--text-muted);
        margin-left: 10px;
        display: block;
        margin-bottom: -5px;
    }
</style>

<div class="edit-card">
    <h2>Edit {{ current_table | title }}</h2>
    <form action="/admin/{{ current_table }}/update/{{ item.id }}" method="POST">
        
        {% if current_table == 'faq' %}
            <label class="input-label">Category</label>
            <input type="text" name="category" value="{{ item.category }}" required>
            
            <label class="input-label">Question Topic</label>
            <input type="text" name="question" value="{{ item.question_topic }}" required>
            
            <label class="input-label">Answer</label>
            <textarea name="answer" required style="border-radius: 16px; padding: 15px; border: 1px solid #d1d5db; background: #f9fafb;">{{ item.answer_text }}</textarea>

        {% elif current_table == 'staff' %}
            <label class="input-label">Full Name</label>
            <input type="text" name="name" value="{{ item.name }}" required>
            
            <label class="input-label">Role</label>
            <input type="text" name="role" value="{{ item.role }}" required>
            
            <label class="input-label">Email</label>
            <input type="email" name="email" value="{{ item.email }}" required>
            
            <label class="input-label">Office Location</label>
            <input type="text" name="office_location" value="{{ item.office_location }}">
            
            <label class="input-label">Office Hours</label>
            <input type="text" name="office_hours" value="{{ item.office_hours }}">

        {% elif current_table == 'facility' %}
            <label class="input-label">Facility Name</label>
            <input type="text" name="name" value="{{ item.name }}" required>
            
            <label class="input-label">Location</label>
            <input type="text" name="location" value="{{ item.location }}" required>
            
            <label class="input-label">Status</label>
            <select name="status" style="width: 100%; padding: 14px; margin: 8px 0 16px; border: 1px solid #d1d5db; border-radius: 25px; background: #f9fafb; font-family: inherit;">
                <option value="Active" {% if item.status == 'Active' %}selected{% endif %}>Active</option>
                <option value="Maintenance" {% if item.status == 'Maintenance' %}selected{% endif %}>Maintenance</option>
                <option value="Closed" {% if item.status == 'Closed' %}selected{% endif %}>Closed</option>
            </select>

        {% elif current_table == 'exam' %}
            <label class="input-label">Course Name</label>
            <input type="text" name="course_name" value="{{ item.course_name }}" required>
            
            <label class="input-label">Exam Date & Time</label>
            <input type="datetime-local" name="exam_date" value="{{ item.exam_date.strftime('%Y-%m-%dT%H:%M') }}" required>
            
            <label class="input-label">Room Number</label>
            <input type="text" name="room_number" value="{{ item.room_number }}" required>
        {% endif %}
        
        <div style="display: flex; gap: 15px; margin-top: 25px;">
            <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
            <a href="/admin?table={{ current_table }}" class="btn btn-secondary" style="background: white; color: var(--text-muted); border: 1px solid var(--border-color); text-align: center; line-height: 24px;">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
