<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus Assistant</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }
        .container {
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 12px 24px;
            text-decoration: none;
            color: white;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-chat { background-color: #007bff; }
        .btn-admin { background-color: #6c757d; }
        .btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to Smart Campus Assistant</h1>
        <p>Your AI-powered guide for campus life.</p>
        
        <a href="/chat" class="btn btn-chat">Start Chatting</a>
        <a href="/admin" class="btn btn-admin">Admin Dashboard</a>
    </div>

</body>
</html>
